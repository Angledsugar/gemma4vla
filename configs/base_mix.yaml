# Base model training: multi-robot LeRobot datasets from Hugging Face Hub
#
# Usage:
#   uv run scripts/train_base.py --config configs/base_mix.yaml
#   uv run scripts/train_base.py --config configs/base_mix.yaml --dummy --device cpu

# Datasets: repo_id + sampling weight
# Weights control how often each dataset is sampled (don't need to sum to 1)
datasets:
  - repo_id: lerobot/droid_100
    weight: 0.4
  - repo_id: lerobot/aloha_sim_insertion_human
    weight: 0.15
  - repo_id: lerobot/aloha_sim_transfer_cube_human
    weight: 0.15
  - repo_id: lerobot/pusht
    weight: 0.1
  - repo_id: lerobot/unitreeh1_fold_clothes
    weight: 0.1
  - repo_id: lerobot/columbia_cairlab_pusht_real
    weight: 0.1

# Common action/state space (all datasets padded to this)
action_dim: 32
action_horizon: 15

# Cache (set to HDD path if you want)
# cache_dir: /media/engineer/DATA/hf_cache
cache_dir: null

training:
  steps: 50000
  batch_size: 2
  lr: 1e-4
  lr_backbone: 1e-5
  warmup_steps: 1000
  save_every: 5000
  knowledge_insulation: false
  rtc: true
  rtc_max_delay: 4
  normalize: true
  device: cuda
  output_dir: checkpoints/base_mix
